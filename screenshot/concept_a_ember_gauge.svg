<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1e27"/>
      <stop offset="1" stop-color="#0c0e13"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb340"/>
      <stop offset="0.55" stop-color="#ff8c2e"/>
      <stop offset="1" stop-color="#ff4d1c"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff7a2e" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#ff7a2e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff7a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#ffe9a8"/>
      <stop offset="1" stop-color="#ffb340"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#sheen)"/>

  <!-- track: 270° gauge, gap at bottom -->
  <path d="M 342.29 681.71 A 240 240 0 1 1 681.71 681.71"
        fill="none" stroke="#262b36" stroke-width="88" stroke-linecap="round"/>

  <!-- progress arc to 70% -->
  <path d="M 342.29 681.71 A 240 240 0 1 1 706.16 370.93"
        fill="none" stroke="url(#arc)" stroke-width="88" stroke-linecap="round"/>

  <!-- white-hot ember tip -->
  <circle cx="706.16" cy="370.93" r="120" fill="url(#halo)"/>
  <circle cx="706.16" cy="370.93" r="44" fill="url(#core)"/>
</svg>
